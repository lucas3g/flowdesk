name: flowdesk
description: "FlowDesk — gerenciador de janelas e layouts de trabalho para macOS."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.1.0
  fpdart: ^1.2.0
  get_it: ^9.2.1
  injectable: ^3.0.0
  drift: ^2.34.1
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol
  window_manager: ^0.5.2
  intl: ^0.20.3
  path_provider: ^2.1.6
  file_selector: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  injectable_generator: ^3.0.2
  build_runner: ^2.15.0
  drift_dev: ^2.34.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true

  fonts:
    - family: MaterialSymbolsRounded
      fonts:
        - asset: assets/fonts/MaterialSymbolsRounded.ttf
